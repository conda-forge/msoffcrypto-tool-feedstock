{% set name = "msoffcrypto-tool" %}
{% set version = "6.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 9a5ebc4c0096b42e5d7ebc2350afdc92dc511061e935ca188468094fdd032bbe

build:
  entry_points:
    - msoffcrypto-tool = msoffcrypto.__main__:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - poetry
  run:
    - cryptography >=2.3
    - olefile >=0.45
    - python >={{ python_min }},<4.0

test:
  imports:
    - msoffcrypto
  commands:
    - pip check
    - msoffcrypto-tool --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/nolze/msoffcrypto-tool
  summary: Python tool and library for decrypting MS Office files with passwords or other keys
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - jan-janssen
